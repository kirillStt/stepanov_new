name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # Шаг 1: Загружаем код
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Проверяем наличие pubspec.yaml
      - name: Verify project structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          dir
          if (Test-Path "pubspec.yaml") {
            echo "✅ pubspec.yaml found"
            Get-Content pubspec.yaml -TotalCount 5
          } else {
            echo "❌ pubspec.yaml NOT found!"
            exit 1
          }

      # Шаг 3: Устанавливаем Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # Шаг 4: Проверяем Flutter
      - name: Flutter doctor
        run: flutter doctor -v

      # Шаг 5: Получаем зависимости
      - name: Get dependencies
        run: flutter pub get

      # Шаг 6: Собираем Windows
      - name: Build Windows
        run: flutter build windows --release

      # Шаг 7: Создаем ZIP
      - name: Create ZIP archive
        run: |
          cd build\windows\x64\runner\Release
          Compress-Archive -Path * -DestinationPath "$env:GITHUB_WORKSPACE\stepanov_new-$env:GITHUB_REF_NAME-windows.zip"

      # Шаг 8: Создаем релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: stepanov_new-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}