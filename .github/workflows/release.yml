name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
        working-directory: . # Явно указываем корневую папку
    
    steps:
      # Шаг 1: Загружаем код
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Шаг 2: Показываем текущую директорию (для отладки)
      - name: Show current directory
        run: pwd && ls -la

      # Шаг 3: Устанавливаем Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # Шаг 4: Проверяем Flutter
      - name: Flutter doctor
        run: flutter doctor -v

      # Шаг 5: Получаем зависимости
      - name: Get dependencies
        run: flutter pub get

      # Шаг 6: Собираем Windows
      - name: Build Windows
        run: flutter build windows --release

      # Шаг 7: Создаем ZIP
      - name: Create ZIP archive
        run: |
          cd build/windows/x64/runner/Release
          zip -r "$GITHUB_WORKSPACE/stepanov_new-$GITHUB_REF_NAME-windows.zip" *

      # Шаг 8: Создаем релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: stepanov_new-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}