name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      # Шаг 1: Загружаем код
      - name: Checkout code
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем правильную рабочую директорию
      - name: Set working directory
        run: |
          echo "Current directory: $(pwd)"
          echo "Looking for pubspec.yaml..."
          if (Test-Path "pubspec.yaml") {
            echo "FOUND pubspec.yaml in current directory"
          } else {
            echo "pubspec.yaml NOT FOUND in current directory"
            # Ищем во всех подпапках
            $files = Get-ChildItem -Recurse -Filter "pubspec.yaml"
            foreach ($file in $files) {
              echo "Found pubspec.yaml in: $($file.DirectoryName)"
            }
          }

      # Шаг 3: Устанавливаем Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # Шаг 4: Проверяем Flutter
      - name: Flutter doctor
        run: flutter doctor -v

      # Шаг 5: Получаем зависимости - ИСПРАВЛЕНО с указанием пути
      - name: Get dependencies
        run: |
          cd ${{ github.workspace }}
          flutter pub get

      # Шаг 6: Собираем Windows
      - name: Build Windows
        run: |
          cd ${{ github.workspace }}
          flutter build windows --release

      # Шаг 7: Создаем ZIP
      - name: Create ZIP archive
        run: |
          cd ${{ github.workspace }}/build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath "${{ github.workspace }}/stepanov_new-${{ github.ref_name }}-windows.zip"

      # Шаг 8: Создаем релиз
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: stepanov_new-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}